<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Command Center • OSARE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; }
        .sidebar { width: 280px; height: 100vh; background: #1e3a8a; color: white; position: fixed; padding: 40px 20px; }
        .main-content { margin-left: 320px; padding: 50px; width: calc(100% - 320px); }
        .btn-cmd { padding: 12px 25px; background: #1e3a8a; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .stat-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-bottom: 6px solid #1e3a8a; }
        .value { font-size: 36px; font-weight: bold; color: #1e3a8a; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>OSARE</h2>
        <p style="opacity:0.6; font-size:11px;">REGIONAL SALES COMMAND</p>
        <a href="/" style="color:white; display:block; margin-top:30px; text-decoration:none;">← Back to Super Search</a>
    </div>
    <div class="main-content">
        <div style="margin-bottom:40px;">
            <button class="btn-cmd" onclick="alert('System Health: Optimal | Neon DB Connected')">⚙️ System Health</button>
            <button class="btn-cmd" onclick="alert('Preparing M-PESA Verification...')">💳 Verify M-PESA Ref</button>
            <button class="btn-cmd" onclick="alert('Generating Report...')">📑 Download CSV</button>
        </div>
        <h1>Executive Overview</h1>
        <div class="stat-card">
            <h3>Total Commission Revenue (5-10%)</h3>
            <span class="value">KES 0.00</span>
        </div>
    </div>
</body>
</html>
