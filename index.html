<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSARE - East Africa Travel</title>
<style>
  body { margin:0; font-family: 'Segoe UI', Arial; background: #0f172a; color:#fff; text-align:center; }
  header { padding:60px 20px; background: linear-gradient(135deg, #1e3a8a, #065f46); }
  h1 { font-size: 3em; margin:0; letter-spacing:2px; }
  h1 span { color:#fbbf24; }
  p { font-size:1.2em; opacity:0.9; }
  .buttons { display:flex; justify-content:center; gap:20px; margin-top:50px; flex-wrap:wrap; }
  .btn { 
    padding:20px 40px; border-radius:12px; text-decoration:none; font-weight:bold; font-size:1.1em;
    transition:0.3s; box-shadow:0 4px 15px rgba(0,0,0,0.3);
  }
  .btn-local { background:#2563eb; color:#fff; }
  .btn-local:hover { background:#1d4ed8; transform:translateY(-3px); }
  .btn-safari { background:#059669; color:#fff; }
  .btn-safari:hover { background:#047857; transform:translateY(-3px); }
  footer { margin-top:80px; padding:20px; font-size:0.9em; opacity:0.7; }
</style>
</head>
<body>
  <header>
    <h1>OS<span>A</span>RE</h1>
    <p>Your Gateway to East Africa Travel</p>
    <div class="buttons">
      <a href="/local" class="btn btn-local">🚆 Local Travel</a>
      <a href="/safari" class="btn btn-safari">🌍 Safari & Tours</a>
    </div>
  </header>
  <footer>
    © 2026 OSARE. Connecting East Africa.
  </footer>
</body>
</html>
