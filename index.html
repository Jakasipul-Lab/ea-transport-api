<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSARE - East Africa Transit Super Search</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f8fafc; color: #1e293b; line-height: 1.6; }
        .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; padding: 3rem 2rem; text-align: center; }
        .container { max-width: 1000px; margin: -3rem auto 2rem; padding: 0 1rem; }
        
        .search-box { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; align-items: end; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: #64748b; }
        .input-group input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; height: 3.2rem; }
        
        .results-section { margin-top: 2rem; display: none; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 0.5rem; }
        .tab { padding: 0.6rem 1.2rem; background: #e2e8f0; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.85rem; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; }
        
        .result-card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .btn-book { background: var(--success); color: white; border: none; padding: 0.6rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 style="font-size: 2.5rem; font-weight: 800;">OSARE</h1>
        <p>East Africa's Transit Super Search</p>
    </div>

    <div class="container">
        <form class="search-box" id="searchForm">
            <div class="input-group">
                <label>Passenger Name</label>
                <input type="text" id="passengerName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <label>From</label>
                <input type="text" id="origin" placeholder="City" value="Nairobi" required>
            </div>
            <div class="input-group">
                <label>To</label>
                <input type="text" id="destination" placeholder="City" value="Mombasa" required>
            </div>
            <button type="submit" class="btn-search">Search</button>
        </form>

        <div class="results-section" id="resultsSection">
            <div class="tabs" id="modeTabs">
                <div class="tab active" data-type="all">All</div>
                <div class="tab" data-type="train">SGR Train</div>
                <div class="tab" data-type="bus">Bus</div>
                <div class="tab" data-type="matatu">Matatu (Sacco GPS)</div>
                <div class="tab" data-type="flight">Light Aircraft</div>
            </div>
            <div id="resultsList"></div>
        </div>
    </div>

    <div class="modal" id="codeModal">
        <div class="modal-content">
            <h2>Success!</h2>
            <p>Your SafariRoutes Lead Code has been generated:</p>
            <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 1rem 0;" id="generatedCode"></div>
            <p>Present this code to the operator.</p>
            <button class="btn-book" style="width: 100%; margin-top: 1rem;" onclick="document.getElementById('codeModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const resultsSection = document.getElementById('resultsSection');
        const resultsList = document.getElementById('resultsList');

        searchForm.onsubmit = (e) => {
            e.preventDefault();
            const results = [
                { type: 'train', operator: 'Madaraka Express (SGR)', price: '1,500 KSH', detail: '08:00 AM • First Class' },
                { type: 'bus', operator: 'Mash East Africa', price: '1,800 KSH', detail: '09:00 PM • VIP Seats' },
                { type: 'matatu', operator: 'North Rift Sacco', price: '1,200 KSH', detail: 'GPS: 4 seats left • Wilson Station' },
                { type: 'flight', operator: 'Safarilink Aviation', price: '8,500 KSH', detail: '10:15 AM • Wilson-Mombasa' }
            ];
            resultsSection.style.display = 'block';
            resultsList.innerHTML = results.map(item => `
                <div class="result-card" data-type="${item.type}">
                    <div>
                        <p style="font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase;">${item.type}</p>
                        <h3>${item.operator}</h3>
                        <p style="color: #64748b; font-size: 0.85rem;">${item.detail}</p>
                    </div>
                    <div style="text-align: right;">
                        <p class="price">${item.price}</p>
                        <button class="btn-book" onclick="showCode()">Get Code</button>
                    </div>
                </div>
            `).join('');
        };

        function showCode() {
            const code = 'SR-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            document.getElementById('generatedCode').innerText = code;
            document.getElementById('codeModal').style.display = 'flex';
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelector('.tab.active').classList.remove('active');
                tab.classList.add('active');
                const type = tab.dataset.type;
                document.querySelectorAll('.result-card').forEach(card => {
                    card.style.display = (type === 'all' || card.dataset.type === type) ? 'flex' : 'none';
                });
            };
        });
    </script>
</body>
</html>
