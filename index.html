<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSARE - East Africa Transit Visual Search</title>
    <style>
        :root { 
            --primary: #1e3a8a; 
            --accent: #3b82f6; 
            --success: #10b981;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 3rem; }
        
        .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; padding: 3rem 2rem; text-align: center; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 20px; }
        
        h2 { margin: 2rem 0 1rem 0; font-size: 1.5rem; color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; }

        /* Flexible Grid for Visual Experience Cards */
        .visual-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 1.5rem; 
            margin-bottom: 2rem;
        }

        /* Clickable Card Styling */
        .image-card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            cursor: pointer; 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 3px solid transparent;
        }
        .image-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.12); 
            border-color: var(--accent);
        }
        .image-card.selected {
            border-color: var(--success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
        }

        /* Card Image Aspect Controls */
        .card-img-holder {
            width: 100%;
            height: 180px;
            background-color: #e2e8f0;
        }
        .card-img-holder img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .card-info { padding: 1.2rem; text-align: center; }
        .card-info h3 { font-size: 1.2rem; font-weight: 700; color: #0f172a; }
        .card-info p { font-size: 0.9rem; color: #64748b; margin-top: 0.25rem; }

        /* Submission Action Bar */
        .action-bar { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; gap: 1rem; align-items: center; justify-content: space-between; margin-top: 2rem; }
        .selection-display { font-weight: 600; color: var(--primary); font-size: 1.1rem; }
        .btn-submit { background: var(--success); color: white; border: none; padding: 1rem 2.5rem; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background: #059669; }

        /* Complete Mobile Scaling Overrides */
        @media (max-width: 600px) {
            .container { padding: 0 12px; }
            .visual-grid { grid-template-columns: 1fr; gap: 1.2rem; }
            .card-img-holder { height: 160px; }
            .action-bar { flex-direction: column; text-align: center; padding: 1.2rem; }
            .btn-submit { width: 100%; padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="font-size: 2.3rem; font-weight: 800;">OSARE</h1>
        <p>Tap an experience image to check transit routes instantly</p>
    </div>
    
    <div class="container">
        
        <h2>Select Your Destination</h2>
        <div class="visual-grid">
            <div class="image-card" onclick="selectExperience('Maasai Mara Big Five Safari', 'Maasai Mara')">
                <div class="card-img-holder">
                    <img src="/static/images/lion.jpg" alt="Big Five Wildlife" onerror="this.src='https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?w=600'">
                </div>
                <div class="card-info">
                    <h3>The Big Five Experience</h3>
                    <p>Maasai Mara Routes & Transits</p>
                </div>
            </div>

            <div class="image-card" onclick="selectExperience('Mombasa Beach Hotels', 'Mombasa')">
                <div class="card-img-holder">
                    <img src="/static/images/mombasa.jpg" alt="Mombasa Coastal Getaway" onerror="this.src='https://images.unsplash.com/photo-1589979482837-e74f2e145060?w=600'">
                </div>
                <div class="card-info">
                    <h3>Coastal & Hotel Resorts</h3>
                    <p>Diani, Malindi & Mombasa Connections</p>
                </div>
            </div>
        </div>

        <form id="safariSearchForm" onsubmit="executeSearch(event)">
            <input type="hidden" id="selectedDestination" value="">
            
            <div class="action-bar">
                <div class="selection-display" id="statusMessage">Please tap a photo card above to choose your route</div>
                <button type="submit" class="btn-submit">Find Travel Deals</button>
            </div>
        </form>

        <footer style="margin-top:4rem; opacity:0.6; text-align: center;">
            © 2026 Osare • Built by nakinson osare
        </footer>
    </div>

    <script>
        function selectExperience(displayName, targetParam) {
            document.querySelectorAll('.image-card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            document.getElementById('selectedDestination').value = targetParam;
            document.getElementById('statusMessage').innerText = "Selected Target: " + displayName;
        }

        function executeSearch(event) {
            event.preventDefault();
            const chosenPlace = document.getElementById('selectedDestination').value;
            
            if (!chosenPlace) {
                alert("Please click one of the safari image blocks above first!");
                return;
            }
            
            // Fires selection variables straight back into your FastAPI query string parser
            window.location.href = `/search?origin=Nairobi&destination=${encodeURIComponent(chosenPlace)}`;
        }
    </script>
</body>
</html>
