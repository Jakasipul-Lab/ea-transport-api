<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSARE - East Africa Transit & Booking Hub</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
--primary: #1e3a8a;
--accent: #3b82f6;
--success: #10b981;
--orange: #f97316;
--whatsapp: #25d366;
--bg: #f8fafc;
--text: #1e293b;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background: var(--bg); color: var(--text); }

.hero { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; padding: 3rem 1rem; text-align: center; }
.container { max-width: 1100px; margin: 1.5rem auto; padding: 0 15px; }

.tier-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 2rem 0; }
.tier-btn { padding: 12px 24px; font-size: 1.05rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
.tier-btn.local { background: #e2e8f0; color: var(--primary); }
.tier-btn.local.active { background: var(--primary); color: white; }
.tier-btn.safari { background: #e2e8f0; color: var(--orange); }
.tier-btn.safari.active { background: var(--orange); color: white; }

.tier-section { display: none; }
.tier-section.active { display: block; }

.booking-form-box { background: white; padding: 1.8rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.06); margin-bottom: 2rem; }
.visual-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }

.image-card { 
    background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.06); 
    cursor: pointer; transition: all 0.3s; 
}
.image-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }
.card-img-holder img { width: 100%; height: 200px; object-fit: cover; }

.map-header { 
    background: white; padding: 1rem; border-radius: 12px 12px 0 0; 
    font-weight: bold; display: flex; justify-content: space-between; align-items: center; 
}
#leaflet-map { height: 460px; border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

@media (max-width: 600px) {
    .tier-nav { flex-direction: column; }
    .tier-btn { width: 100%; text-align: center; }
    #leaflet-map { height: 380px; }
}
</style>
</head>
<body>

<div class="hero">
    <h1 style="font-size: 2.5rem;">OSARE</h1>
    <p style="opacity: 0.9; font-size: 1.1rem;">East Africa Transit • On-Ground Tourist Assistance</p>
</div>

<div class="container">

<div class="tier-nav">
    <button class="tier-btn local active" onclick="switchTier('local')">🚆 Local Commute</button>
    <button class="tier-btn safari" onclick="switchTier('safari')">🌍 Tourist Assistance</button>
</div>

<!-- Local Commute Section (your original) -->
<div id="localSection" class="tier-section active">
    <!-- Paste your original local section content here if you want to keep it -->
    <h2>Local Commute Options</h2>
    <p>Your existing local transit booking form goes here...</p>
</div>

<!-- Clean Tourist Assistance Section -->
<div id="safariSection" class="tier-section">
    <h2>🌍 On-Ground Tourist Assistance - East Africa</h2>
    <p class="subtitle">Car Hire • Light Aircraft • Hotels • Top Destinations • Instant Support</p>

    <!-- Search -->
    <div class="booking-form-box">
        <input type="text" id="touristSearch" placeholder="What do you need? (Car hire, Mara resort, Light aircraft...)" 
               style="width:100%; padding:16px; border:2px solid #e2e8f0; border-radius:12px; font-size:1.05rem;">
        <button onclick="filterAssistance()" style="margin-top:12px;width:100%;padding:14px;background:var(--orange);color:white;border:none;border-radius:12px;font-weight:bold;">
            Search Options
        </button>
    </div>

    <!-- Map -->
    <div class="map-header">
        <span>🗺️ Interactive East Africa Map</span>
        <button onclick="centerMapOnNairobi()" style="background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:8px;">Reset Map</button>
    </div>
    <div id="leaflet-map"></div>

    <!-- Assistance Cards -->
    <div class="visual-grid" id="assistanceGrid"></div>
</div>

</div>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// === Your original functions (switchTier, etc.) ===
function switchTier(tier) {
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tier-section').forEach(s => s.classList.remove('active'));
    
    if (tier === 'local') {
        document.querySelector('.tier-btn.local').classList.add('active');
        document.getElementById('localSection').classList.add('active');
    } else {
        document.querySelector('.tier-btn.safari').classList.add('active');
        document.getElementById('safariSection').classList.add('active');
    }
}

// === Tourist Assistance Data ===
const assistanceOptions = [
    {cat:"Car Hire", name:"4x4 Safari Vehicles", desc:"Self-drive or driver included", price:"From $80/day", link:"https://www.avis.co.ke", phone:"+254712345678", img:"https://images.unsplash.com/photo-1494976388531-d1058494a5a9?w=600"},
    {cat:"Light Aircraft", name:"Charter Flights", desc:"Direct to national parks", price:"From $850/flight", link:"https://www.safarilink.co.ke", phone:"+254789111222", img:"https://images.unsplash.com/photo-1589979482837-e74f2e145060?w=600"},
    {cat:"Railways", name:"SGR Madaraka Express", desc:"Nairobi - Mombasa", price:"From KES 1,500", link:"https://www.krc.co.ke", phone:"+254712345678", img:"https://images.unsplash.com/photo-1544620347-c4fd70a2e7c8?w=600"},
    {cat:"Hotels & Resorts", name:"Maasai Mara Luxury Camps", desc:"Tented camps with game viewing", price:"From $320/night", link:"https://www.asiliaafrica.com", phone:"+254733444555", img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=600"},
    {cat:"Places to Visit", name:"Maasai Mara Reserve", desc:"Big Five & Migration", price:"Park fee $70", link:"https://www.magicalkenya.com", phone:"+254712345678", img:"https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?w=600"}
];

let safariMap;

function initLeafletMap() {
    safariMap = L.map('leaflet-map').setView([-1.29, 36.82], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(safariMap);

    // Sample markers
    L.marker([-1.4, 35.0]).addTo(safariMap).bindPopup("<b>Maasai Mara</b><br>Top Safari Destination");
    L.marker([-2.65, 37.25]).addTo(safariMap).bindPopup("<b>Amboseli</b><br>Elephants & Kilimanjaro");
}

function renderAssistance(data = assistanceOptions) {
    const grid = document.getElementById('assistanceGrid');
    grid.innerHTML = data.map(item => `
        <div class="image-card" onclick="contactViaWhatsApp('${item.name}', '${item.phone}')">
            <div class="card-img-holder"><img src="${item.img}" alt="${item.name}"></div>
            <div style="padding:1.2rem;">
                <strong style="color:var(--orange);">${item.cat}</strong>
                <h3 style="margin:8px 0 6px;">${item.name}</h3>
                <p>${item.desc}</p>
                <p style="font-weight:bold;color:var(--success);">${item.price}</p>
                <a href="${item.link}" target="_blank" style="color:var(--accent);">Visit Provider →</a>
            </div>
        </div>
    `).join('');
}

function filterAssistance() {
    const term = document.getElementById('touristSearch').value.toLowerCase();
    const filtered = assistanceOptions.filter(i => 
        i.name.toLowerCase().includes(term) || i.cat.toLowerCase().includes(term) || i.desc.toLowerCase().includes(term)
    );
    renderAssistance(filtered);
}

function contactViaWhatsApp(name, phone) {
    const msg = `Hello, I'm interested in ${name}. Please assist me.`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function centerMapOnNairobi() {
    if (safariMap) safariMap.flyTo([-1.2921, 36.8219], 6);
}

// Initialize
window.onload = () => {
    initLeafletMap();
    renderAssistance();
};
</script>
</body>
</html>
