<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSARE Dashboard - Commission Tracker</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f8fafc; }
table { width: 100%; border-collapse: collapse; margin: 20px 0; }
th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
th { background: #1e3a8a; color: white; }
input, button { padding: 10px; margin: 5px; }
</style>
</head>
<body>
<h1>5% Commission Tracker</h1>

<input type="text" id="vendor" placeholder="Vendor Name" />
<input type="number" id="amount" placeholder="Booking Amount (KES)" />
<button onclick="addCommission()">Record Booking</button>

<table>
    <tr><th>Date</th><th>Vendor</th><th>Amount</th><th>5% Commission</th></tr>
    <tbody id="tableBody"></tbody>
</table>

<p><strong>Total Commission:</strong> <span id="total">KES 0</span></p>

<button onclick="clearData()">Clear All Data</button>

<script>
// Load saved data
let commissions = JSON.parse(localStorage.getItem('commissions')) || [];

function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    let total = 0;

    commissions.forEach((entry, index) => {
        total += entry.commission;
        tbody.innerHTML += `
            <tr>
                <td>${entry.date}</td>
                <td>${entry.vendor}</td>
                <td>KES ${entry.amount}</td>
                <td>KES ${entry.commission}</td>
            </tr>`;
    });

    document.getElementById('total').textContent = `KES ${total.toLocaleString()}`;
}

function addCommission() {
    const vendor = document.getElementById('vendor').value;
    const amount = parseFloat(document.getElementById('amount').value);

    if (!vendor || !amount) {
        alert("Please fill all fields");
        return;
    }

    const commission = Math.round(amount * 0.05);

    commissions.push({
        date: new Date().toLocaleDateString(),
        vendor: vendor,
        amount: amount,
        commission: commission
    });

    localStorage.setItem('commissions', JSON.stringify(commissions));
    renderTable();

    // Clear inputs
    document.getElementById('vendor').value = '';
    document.getElementById('amount').value = '';
}

function clearData() {
    if (confirm("Clear all commission data?")) {
        commissions = [];
        localStorage.removeItem('commissions');
        renderTable();
    }
}

// Initial render
renderTable();
</script>
</body>
</html>
