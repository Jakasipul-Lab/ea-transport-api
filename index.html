<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EA SafariRoutes</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        nav { background: #f4f4f4; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        nav a { margin-right: 15px; text-decoration: none; color: #2c3e50; font-weight: bold; }
        .hero { margin-bottom: 30px; }
        .route-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        #routeSearch { padding: 10px; width: 100%; max-width: 300px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/admin">Admin</a>
        <a href="/migration">Migration</a>
    </nav>

    <div class="hero">
        <h1>EA SafariRoutes</h1>
        <p>Your trusted gateway to travel across East Africa.</p>
    </div>

    <input type="text" id="routeSearch" placeholder="Search routes..." oninput="filterRoutes()">

    <div id="routes-container">Loading routes...</div>

    <script>
        async function loadRoutes() {
            try {
                const response = await fetch('/api/routes');
                const routes = await response.json();
                const container = document.getElementById('routes-container');
                
                container.innerHTML = routes.map(r => `
                    <div class="route-card">
                        <h3>${r.operator}</h3>
                        <p><strong>Route:</strong> ${r.origin} → ${r.destination}</p>
                        <button onclick="alert('Booking confirmed for ${r.operator}')">Book Now</button>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('routes-container').innerHTML = "Could not load routes.";
            }
        }

        function filterRoutes() {
            const input = document.getElementById('routeSearch').value.toLowerCase();
            const cards = document.getElementsByClassName('route-card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
            }
        }

        loadRoutes();
    </script>
</body>
</html>
