<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Tourist Assistance Database
const assistanceOptions = [
    {
        category: "Car Hire",
        name: "4x4 Safari Vehicle Hire",
        desc: "Self-drive or chauffeured Land Cruisers",
        price: "From $80/day",
        link: "https://www.avis.co.ke" ,
        phone: "+254712345678",
        location: "Nairobi & Major Parks"
    },
    {
        category: "Light Aircraft",
        name: "Charter Flights",
        desc: "Light aircraft to Mara, Amboseli, Samburu",
        price: "From $850 per flight",
        link: "https://www.safarilink.co.ke",
        phone: "+254789111222",
        location: "Wilson Airport, Nairobi"
    },
    {
        category: "Railways",
        name: "SGR Madaraka Express",
        desc: "Nairobi to Mombasa / Kisumu",
        price: "From KES 1,500",
        link: "https://www.krc.co.ke",
        phone: "+254712345678",
        location: "Nairobi SGR Station"
    },
    {
        category: "Hotels & Resorts",
        name: "Mara Luxury Tented Camp",
        desc: "Premium eco-lodges with game viewing",
        price: "From $320/night",
        link: "https://www.asiliaafrica.com",
        phone: "+254733444555",
        location: "Maasai Mara"
    },
    {
        category: "Places to Visit",
        name: "Maasai Mara National Reserve",
        desc: "Big Five & Great Migration",
        price: "Park Fees $70",
        link: "https://www.magicalkenya.com",
        phone: "+254712345678",
        location: "Maasai Mara"
    }
];

let safariMap;

function initLeafletMap() {
    safariMap = L.map('leaflet-map').setView([-1.2921, 36.8219], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(safariMap);

    // Add markers
    assistanceOptions.forEach(item => {
        if (item.location.includes("Mara") || item.location.includes("Nairobi")) {
            const marker = L.marker([-1.4, 35.0]).addTo(safariMap); // example coords
            marker.bindPopup(`<b>${item.name}</b><br>${item.desc}`);
        }
    });
}

function renderAssistance(filtered = assistanceOptions) {
    const grid = document.getElementById('assistanceGrid');
    grid.innerHTML = filtered.map(item => `
        <div class="image-card" onclick="contactViaWhatsApp('${item.name}', '${item.phone}')">
            <div style="padding:1.2rem;">
                <strong style="color:var(--orange);">${item.category}</strong>
                <h3>${item.name}</h3>
                <p>${item.desc}</p>
                <p><strong>${item.price}</strong></p>
                <a href="${item.link}" target="_blank" style="color:var(--accent); text-decoration:underline;">Visit Provider →</a>
            </div>
        </div>
    `).join('');
}

function filterAssistance() {
    const term = document.getElementById('touristSearch').value.toLowerCase();
    const filtered = assistanceOptions.filter(item => 
        item.name.toLowerCase().includes(term) || 
        item.category.toLowerCase().includes(term) ||
        item.desc.toLowerCase().includes(term)
    );
    renderAssistance(filtered);
}

function contactViaWhatsApp(service, phone) {
    const msg = `Hello, I need assistance with ${service} in East Africa.`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function centerMapOnNairobi() {
    if (safariMap) safariMap.flyTo([-1.2921, 36.8219], 6);
}

// Initialize
window.onload = () => {
    initLeafletMap();
    renderAssistance();
};
</script>
