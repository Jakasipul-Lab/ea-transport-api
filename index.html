<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSARE - East Africa Transit & Booking Hub</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ... your previous styles ... */
.gtfs-info { font-size: 0.9rem; background: #f0f9ff; padding: 8px; border-radius: 6px; }
</style>
</head>
<body>
<!-- Navigation, Hero, Tier Nav same as before -->

<div id="safariSection" class="tier-section">
    <h2>🌍 Live GTFS Transit Tracker</h2>
    <p class="subtitle">Real-time bus & train positions (GTFS powered)</p>

    <div class="map-header">
        <span>🗺️ GTFS East Africa Transport Map</span>
        <button onclick="toggleGTFS()">Toggle Live Vehicles</button>
    </div>
    <div id="leaflet-map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// GTFS-style Data (easy to replace with real CSV/JSON later)
const gtfsData = {
    stops: [
        {id:1, name:"Nairobi CBD", lat:-1.2921, lng:36.8219},
        {id:2, name:"Mombasa Terminus", lat:-4.0435, lng:39.6682},
        {id:3, name:"Maasai Mara Gate", lat:-1.406, lng:35.0},
    ],
    routes: [
        {id:"R1", name:"Nairobi-Mombasa SGR/Express", color:"#ef4444"},
        {id:"R2", name:"Mara Shuttle", color:"#3b82f6"}
    ]
};

let safariMap;
let vehicleMarkers = [];
let gtfsInterval;

function initGTFSMap() {
    safariMap = L.map('leaflet-map').setView([-1.2921, 36.8219], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(safariMap);

    // Add stops
    gtfsData.stops.forEach(stop => {
        L.circleMarker([stop.lat, stop.lng], {radius:8, color:'#1e3a8a'}).addTo(safariMap)
         .bindPopup(`<b>${stop.name}</b><br>GTFS Stop`);
    });
}

function startGTFSLive() {
    if (gtfsInterval) clearInterval(gtfsInterval);

    const vehicles = [
        {route:"R1", name:"SGR Express", pos:[-1.2921,36.8219]},
        {route:"R2", name:"Mara Shuttle", pos:[-1.4,35.0]}
    ];

    vehicles.forEach(v => {
        const marker = L.marker(v.pos, {
            icon: L.divIcon({className:'bus-marker', html:'🚌', iconSize:[32,32]})
        }).addTo(safariMap).bindPopup(`<b>${v.name}</b><br>Live • On Schedule`);
        vehicleMarkers.push(marker);
    });

    gtfsInterval = setInterval(() => {
        vehicleMarkers.forEach((marker, i) => {
            let current = marker.getLatLng();
            current.lat += (i % 2 === 0 ? 0.015 : -0.01);
            current.lng += 0.02;
            marker.setLatLng(current);
        });
    }, 2000);
}

function toggleGTFS() {
    if (vehicleMarkers.length > 0) {
        vehicleMarkers.forEach(m => safariMap.removeLayer(m));
        vehicleMarkers = [];
        clearInterval(gtfsInterval);
    } else {
        startGTFSLive();
    }
}

// Initialize
window.onload = () => {
    initGTFSMap();
    // render your assistance cards...
};
</script>
</body>
</html>
