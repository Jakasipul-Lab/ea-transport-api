
<script>
    // 1. Fetch and display the available routes (The Commuter/General List)
    async function loadRoutes() {
        try {
            const res = await fetch('/api/routes');
            const routes = await res.json();
            const list = document.getElementById('routes-list');
            list.innerHTML = '';

            routes.forEach(route => {
                const card = document.createElement('div');
                card.className = 'route-card';
                const operatorName = route.operator || (route.operators ? route.operators[0] : "Standard Operator");
                
                card.innerHTML = `
                    <div>
                        <strong>${route.origin} to ${route.destination}</strong><br>
                        <small>${operatorName} (${route.type})</small>
                    </div>
                    <button class="btn" onclick="bookRoute('${route.route_id}', '${operatorName}')">Get Code</button>
                `;
                list.appendChild(card);
            });
        } catch (error) {
            document.getElementById('routes-list').innerHTML = '<p>Unable to load routes. Please try again later.</p>';
        }
    }

    // 2. Perform a specific search (The OSARE Gateway Logic)
    async function performSearch(mode) {
        const payload = { mode: mode, origin: { lat: 0, lng: 0 }, destination: { lat: 0, lng: 0 } };

        const response = await fetch('/api/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (data.status === 'success') {
            // Logic to display search-specific results
            console.log("Search Result:", data);
        }
    }
    
    // 3. The Booking Engine (Connects the vendor to your 5% commission)
    async function bookRoute(routeId, operator) {
        const name = prompt("Enter passenger name:") || "Guest";
        
        const res = await fetch('/api/book', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ route_id: routeId, operator: operator, passenger_name: name })
        });
        
        const data = await res.json();
        
        if (data.status === 'success') {
            document.getElementById('safariroute-code').innerText = data.code;
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
        } else {
            alert("Booking could not be finalized. Please try again.");
        }
    }

    // Initialize the page on load
    loadRoutes();
</script>
