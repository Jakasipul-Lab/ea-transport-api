<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSARE - East Africa Transit & Booking Hub</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* Your previous styles + map enhancements */
#leaflet-map { height: 500px; border-radius: 12px; }
.bus-marker { background: #ef4444; color: white; padding: 4px 8px; border-radius: 50%; font-size: 0.8rem; }
</style>
</head>
<body>
<!-- Navigation and Hero same as before -->

<div class="container">
    <!-- Tier Nav -->
    <div class="tier-nav"> ... </div>

    <!-- Local Section (your full original) -->
    <div id="localSection" class="tier-section active"> ... </div>

    <!-- Tourist Assistance -->
    <div id="safariSection" class="tier-section">
        <h2>🌍 Live Transport Tracker & Tourist Assistance</h2>

        <div class="map-header">
            <span>🗺️ Real-Time East Africa Transport Map</span>
            <button onclick="toggleBusSimulation()">Toggle Live Buses</button>
        </div>
        <div id="leaflet-map"></div>

        <!-- Assistance Cards -->
        <div class="visual-grid" id="assistanceGrid"></div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Leaflet Map with Real-Time Bus Simulation
let safariMap;
let busMarkers = [];
let simulationInterval;

function initLeafletMap() {
    safariMap = L.map('leaflet-map').setView([-1.2921, 36.8219], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(safariMap);

    // Major destinations
    L.marker([-1.406, 35.0]).addTo(safariMap).bindPopup("<b>Maasai Mara</b>");
    L.marker([-2.65, 37.25]).addTo(safariMap).bindPopup("<b>Amboseli</b>");
}

function startBusSimulation() {
    if (simulationInterval) clearInterval(simulationInterval);

    const busRoutes = [
        {id:1, name:"Nairobi-Mombasa Express", from:[-1.29,36.82], to:[-4.05,39.65], color:"red"},
        {id:2, name:"Mara Shuttle", from:[-1.4,35.0], to:[-1.29,36.82], color:"blue"}
    ];

    busRoutes.forEach(route => {
        const marker = L.marker(route.from, {
            icon: L.divIcon({className: 'bus-marker', html: '🚌', iconSize: [30,30]})
        }).addTo(safariMap).bindPopup(`<b>${route.name}</b><br>Live • On Time`);

        busMarkers.push({marker, route, progress: 0});
    });

    simulationInterval = setInterval(() => {
        busMarkers.forEach(b => {
            b.progress += 0.08;
            if (b.progress > 1) b.progress = 0;

            const lat = b.route.from[0] + (b.route.to[0] - b.route.from[0]) * b.progress;
            const lng = b.route.from[1] + (b.route.to[1] - b.route.from[1]) * b.progress;

            b.marker.setLatLng([lat, lng]);
        });
    }, 1500);
}

function toggleBusSimulation() {
    if (busMarkers.length > 0) {
        busMarkers.forEach(b => safariMap.removeLayer(b.marker));
        busMarkers = [];
        clearInterval(simulationInterval);
    } else {
        startBusSimulation();
    }
}

// Rest of your assistance cards, local search, etc.
window.onload = () => {
    initLeafletMap();
    // renderAssistance();
};
</script>
</body>
</html>
