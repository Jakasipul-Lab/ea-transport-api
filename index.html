<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSARE - East Africa Transit & Booking Hub</title>
    <style>
        :root {--primary: #1e3a8a; --accent: #3b82f6; --orange: #f97316; --bg: #f8fafc;}
        body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; margin:0; padding:0; }
        .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; padding: 3rem 1rem; text-align: center; }
        .container { max-width: 1100px; margin: 1.5rem auto; padding: 0 15px; }
        .tier-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 2rem 0; }
        .tier-btn { padding: 12px 24px; font-size: 1.05rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .tier-btn.local { background: #e2e8f0; color: var(--primary); }
        .tier-btn.local.active { background: var(--primary); color: white; }
        .tier-btn.safari { background: #e2e8f0; color: var(--orange); }
        .tier-btn.safari.active { background: var(--orange); color: white; }
        .tier-section { display: none; }
        .tier-section.active { display: block; }
        .booking-form-box { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.06); margin-bottom: 2rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #475569; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .btn-search { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-search:active { transform: scale(0.98); }
        footer { margin-top: 4rem; opacity: 0.8; text-align: center; padding-bottom: 3rem; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="hero">
    <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">OSARE</h1>
    <p style="opacity: 0.9; font-size: 1.1rem;">East Africa Transit • Local Logistics Information</p>
</div>

<div class="container">
    <div class="tier-nav">
        <button class="tier-btn local active" onclick="switchTier('local')">Local Commute</button>
        <button class="tier-btn safari" onclick="switchTier('safari')">Tourist Assistance</button>
    </div>

    <!-- LOCAL COMMUTE SECTION -->
    <div id="localSection" class="tier-section active">
        <div class="booking-form-box">
            <h2 style="color: var(--primary); margin-top: 0;">Compare Local Transits</h2>
            <p style="color: #64748b; margin-bottom: 1.5rem;">Schedules sorted from Matatus up to SGR Trains.</p>
            <form action="/search/local" method="GET">
                <div class="input-group">
                    <label>Search Route</label>
                    <input type="text" name="q" placeholder="e.g. Nairobi to Mombasa" required>
                </div>
                <button type="submit" class="btn-search" style="background: var(--primary); color: white;">Search Routes</button>
            </form>
        </div>
    </div>

    <!-- TOURIST ASSISTANCE SECTION -->
    <div id="safariSection" class="tier-section">
        <div class="booking-form-box">
            <h2 style="color: var(--orange); margin-top: 0;">Tourist Assistance</h2>
            <p style="color: #64748b; margin-bottom: 1.5rem;">Car Hire • Hotels • Safari Tours</p>
            <form action="/search/safari" method="GET">
                <div class="input-group">
                    <label>What are you looking for?</label>
                    <input type="text" name="q" placeholder="e.g. Mara safari, Car hire" required>
                </div>
                <button type="submit" class="btn-search" style="background: var(--orange); color: white;">Explore Options</button>
            </form>
        </div>
    </div>

    <footer>
        © 2026 Osare • Built by nakinson osare
    </footer>
</div>

<script>
function switchTier(tier) {
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tier-section').forEach(s => s.classList.remove('active'));
    if (tier === 'local') {
        document.querySelector('.tier-btn.local').classList.add('active');
        document.getElementById('localSection').classList.add('active');
    } else {
        document.querySelector('.tier-btn.safari').classList.add('active');
        document.getElementById('safariSection').classList.add('active');
    }
}
</script>
</body>
</html>
