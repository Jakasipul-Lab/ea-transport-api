<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Safari Routes • Digital Boarding Pass</title>
    <!-- Standard open-source QR code rendering engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; padding: 20px; }
        .ticket-card { width: 100%; max-width: 400px; background: #ffffff; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); overflow: hidden; border: 1px solid #e0e0e0; }
        .ticket-header { background: #004d40; color: #ffffff; padding: 20px; text-align: center; }
        .ticket-header h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        .ticket-header p { margin: 5px 0 0 0; font-size: 12px; opacity: 0.8; }
        .ticket-body { padding: 24px; color: #333333; }
        .route-zone { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .station { font-size: 22px; font-weight: bold; color: #004d40; }
        .arrow { font-size: 18px; color: #888888; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; font-size: 14px; }
        .info-label { color: #777777; font-size: 11px; text-transform: uppercase; margin-bottom: 2px; }
        .info-value { font-weight: 600; }
        .qr-container { display: flex; flex-direction: column; align-items: center; background: #fafafa; padding: 20px; border-radius: 12px; border: 1px dashed #cccccc; }
        #qrcode { margin-bottom: 12px; }
        .ticket-footer { text-align: center; padding: 15px; background: #f9f9f9; font-size: 11px; color: #666666; border-top: 1px solid #eeeeee; }
    </style>
</head>
<body>

<div class="ticket-card">
    <div class="ticket-header">
        <h1>EA SAFARI ROUTES</h1>
        <p>Verified Agency E-Ticket • Kisumu HQ</p>
    </div>
    
    <div class="ticket-body">
        <div class="route-zone">
            <span class="station" id="ui-from">DAR</span>
            <span class="arrow">➔</span>
            <span class="station" id="ui-to">DOM</span>
        </div>

        <div class="info-grid">
            <div>
                <div class="info-label">Passenger</div>
                <div class="info-value" id="ui-passenger">Loading...</div>
            </div>
            <div>
                <div class="info-label">Date / Time</div>
                <div class="info-value" id="ui-date">Loading...</div>
            </div>
            <div>
                <div class="info-label">Seat / Coach</div>
                <div class="info-value" id="ui-seat">Loading...</div>
            </div>
            <div>
                <div class="info-label">Official Operator Ref</div>
                <div class="info-value" id="ui-ref">Loading...</div>
            </div>
        </div>

        <div class="qr-container">
            <!-- QR code injects directly inside this block -->
            <div id="qrcode"></div>
            <div class="info-label" style="margin-top: 5px;">Scan at Station Turnstile</div>
        </div>
    </div>

    <div class="ticket-footer">
        Modern Services Fee (5% Commission) Included.<br>
        EA Safari Routes Managed Booking Reference: <span id="ui-agency-id">###</span>
    </div>
</div>

<script>
    // Hypothetical data injected from your Render database backend
    const currentTicket = {
        passenger: "Amiri Swahili",
        from: "DAR",
        to: "DOM",
        date: "June 25, 2026",
        seat: "Coach 02, Seat 44",
        officialRef: "TRC-SGR-8891A7B", // This is the code that actually controls the state railway barrier
        agencyId: "SR-817293"
    };

    // UI population
    document.getElementById('ui-passenger').innerText = currentTicket.passenger;
    document.getElementById('ui-from').innerText = currentTicket.from;
    document.getElementById('ui-to').innerText = currentTicket.to;
    document.getElementById('ui-date').innerText = currentTicket.date;
    document.getElementById('ui-seat').innerText = currentTicket.seat;
    document.getElementById('ui-ref').innerText = currentTicket.officialRef;
    document.getElementById('ui-agency-id').innerText = currentTicket.agencyId;

    // Generate optical scanner asset from the official reference string
    new QRCode(document.getElementById("qrcode"), {
        text: currentTicket.officialRef,
        width: 160,
        height: 160,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });
</script>

</body>
</html>
