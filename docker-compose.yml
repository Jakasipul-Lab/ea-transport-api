# 1. Use a slim version of Python as the base
FROM python:3.11-slim

# 2. Set the working directory inside the NAS container
WORKDIR /app

# 3. Copy your requirements file first (this is efficient)
COPY requirements.txt .

# 4. Install the libraries listed in requirements.txt
RUN pip install --no-cache-dir -r requirements.txt

version: '3.8'
services:
  web:
    build: .
    ports:
      - "8000:8000"
    restart: always

# 5. Copy the rest of your code into the container
COPY . .

# 6. The command to start your FastAPI/Python server
CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
